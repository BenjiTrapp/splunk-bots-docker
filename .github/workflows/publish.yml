name: Build and Publish to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        bots: [1, 2, 3]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate SPLUNK_APPS_URL
        id: apps
        run: |
          APPS=$(cd apps/botsv${{ matrix.bots }} && printf '%s\n' *.tgz | sort | sed 's|^|/tmp/apps/|' | tr '\n' ',' | sed 's/,$//')

          case "${{ matrix.bots }}" in
            1) DATASET="https://s3.amazonaws.com/botsdataset/botsv1/botsv1-attack-only.tgz" ;;
            2) DATASET="https://s3.amazonaws.com/botsdataset/botsv2/botsv2_data_set_attack_only.tgz" ;;
            3) DATASET="https://botsdataset.s3.amazonaws.com/botsv3/botsv3_data_set.tgz" ;;
          esac

          echo "url=${APPS},${DATASET}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/bots${{ matrix.bots }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BOTS_VERSION=${{ matrix.bots }}
            SPLUNK_APPS_URL=${{ steps.apps.outputs.url }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
